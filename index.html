<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>프로자막생성기 — 상록교회 방송실</title>

 <link rel="preconnect" href="https://cdn.jsdelivr.net">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

 <script src="https://cdn.tailwindcss.com"></script>
 <script>
  tailwind.config = {
   darkMode: 'class',
   theme: {
    extend: {
     fontFamily: { sans: ['Pretendard Variable', 'Pretendard', 'sans-serif'] }
    }
   }
  }
 </script>

 <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">

 <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

 <style>
  body { font-family: 'Pretendard Variable', Pretendard, sans-serif; }
  #lyricInput { ime-mode: active; }
  #previewContainer::-webkit-scrollbar { width: 5px; }
  #previewContainer::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 9999px; }
  #slideModal .modal-box { aspect-ratio: 16/9; max-width: min(92vw, 960px); width: 100%; height: auto; }
  .slide-card { transition: box-shadow 0.15s, border-color 0.15s; will-change: box-shadow; }

  /* --- 모바일/세로모드 대응 (유동적 높이) --- */
  @media (max-width: 1023px) and (orientation: portrait) {
    #lyricInput { 
      min-height: 120px !important; 
      height: auto !important; 
      overflow-y: hidden; /* 자동 확장을 위해 스크롤 숨김 */
    }
    #previewContainer { min-height: 120px !important; max-height: 600px !important; height: auto !important; }
  }
  
  /* --- 가로모드/PC 대응 (고정 높이 유지) --- */
  @media (min-width: 1024px) or (orientation: landscape) {
    .main-grid-container { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    #lyricInput, #previewContainer { min-height: 520px !important; height: 520px !important; }
    #lyricInput { overflow-y: auto !important; }
  }
  
  .no-wrap-header { flex-wrap: nowrap !important; white-space: nowrap; }
  .overflow-x-auto-mobile { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .overflow-x-auto-mobile::-webkit-scrollbar { display: none; }
 </style>
</head>

<body class="bg-base-100 text-base-content min-h-screen font-sans">

 <div id="app" class="max-w-[1400px] mx-auto px-4 sm:px-6 py-6 sm:py-10">

  <header class="flex items-center justify-between mb-5 no-wrap-header gap-2">
   <div class="flex items-center gap-2 sm:gap-4 overflow-hidden">
    <img src="https://cdn.imweb.me/upload/S20221222d3f155c224be8/4a8a3db1aa446.png"
      alt="상록교회 로고" class="h-8 sm:h-11 w-auto object-contain shrink-0">
    <div class="flex items-baseline gap-1 sm:gap-2 overflow-hidden">
     <h1 class="text-lg sm:text-2xl lg:text-3xl font-black tracking-tight leading-none truncate">프로자막생성기</h1>
     <span class="text-[10px] sm:text-sm text-base-content/40 font-normal shrink-0">by 방송실</span>
    </div>
   </div>
   <div class="flex items-center gap-2 shrink-0">
    <div class="hidden md:flex items-center gap-1.5 text-xs text-base-content/40 mr-1">
     <kbd class="kbd kbd-xs">Ctrl(⌘)</kbd>+<kbd class="kbd kbd-xs">S</kbd><span>PPT</span>
     <span class="mx-1 opacity-40">|</span>
     <kbd class="kbd kbd-xs">Ctrl(⌘)</kbd>+<kbd class="kbd kbd-xs">C</kbd><span>복사</span>
    </div>
    <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm" title="다크모드 전환">
     <input type="checkbox" id="darkToggle" onchange="toggleDark(this)">
     <svg class="swap-off w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7,5,6.34A1,1,0,0,0,3.54,7.76L4.24,8.46A1,1,0,0,0,5.64,7ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Zm6.36-9,.71-.71A1,1,0,0,0,17.66,4.34l-.71.71A1,1,0,0,0,18.36,6.5Z"/></svg>
     <svg class="swap-on w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
    </label>
   </div>
  </header>

  <div class="alert mb-5 py-3 flex-row justify-between gap-2 rounded-xl border border-info/20 bg-info/5 no-wrap-header">
   <div class="flex items-center gap-2 sm:gap-3 overflow-hidden">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-info shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
    <div class="text-[11px] sm:text-sm truncate"><span class="font-bold text-info">맞춤법 검사 권장</span></div>
   </div>
   <a href="https://search.naver.com/search.naver?where=nexearch&query=맞춤법+검사기" target="_blank" rel="noopener" class="btn btn-xs sm:btn-sm btn-success shrink-0">검사기 이동 ↗</a>
  </div>

  <div class="flex items-center justify-between mb-4 no-wrap-header gap-2 overflow-hidden">
   <div class="flex items-center gap-2 sm:gap-3 overflow-x-auto-mobile shrink-0">
    <span class="text-xs sm:text-sm font-bold text-base-content/70">분할</span>
    <div class="join">
     <button class="btn btn-xs sm:btn-sm join-item split-btn btn-outline" data-val="1" onclick="setSplit(1)">1줄</button>
     <button class="btn btn-xs sm:btn-sm join-item split-btn btn-primary" data-val="2" onclick="setSplit(2)">2줄</button>
     <button class="btn btn-xs sm:btn-sm join-item split-btn btn-outline" data-val="3" onclick="setSplit(3)">3줄</button>
     <button class="btn btn-xs sm:btn-sm join-item split-btn btn-outline" data-val="4" onclick="setSplit(4)">4줄</button>
    </div>
   </div>
   <div class="flex items-center gap-1.5 sm:gap-2 text-[10px] sm:text-sm shrink-0">
    <span id="statSlides" class="badge badge-xs sm:badge-sm badge-primary badge-outline font-bold">0 슬라이드</span>
    <span id="statLines" class="badge badge-xs sm:badge-sm badge-ghost">0 줄</span>
    <span class="badge badge-xs sm:badge-sm badge-success badge-outline gap-1"><span class="w-1 h-1 rounded-full bg-success animate-pulse inline-block"></span>Live</span>
   </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 main-grid-container">
   <div class="flex flex-col">
    <div class="flex items-center justify-between mb-1.5">
     <label class="text-sm font-bold flex items-center gap-1.5" for="lyricInput">가사 원본 입력</label>
     <span id="charInfo" class="text-xs text-base-content/40">0줄</span>
    </div>
    <textarea id="lyricInput" class="textarea textarea-bordered w-full text-base leading-relaxed font-medium resize-none flex-1 focus:outline-primary focus:border-primary overflow-y-auto" placeholder="가사를 입력하세요..." oninput="handleInput()" spellcheck="false"></textarea>
   </div>

   <div class="flex flex-col">
    <div class="flex items-center justify-between mb-1.5"><label class="text-sm font-bold">슬라이드 미리보기</label></div>
    <div id="previewContainer" class="flex-1 overflow-y-auto rounded-t-2xl border border-base-300 bg-base-200/50 p-4"></div>
    <div class="border border-t-0 border-base-300 rounded-b-2xl bg-base-100 p-3">
     <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      <button class="btn btn-sm btn-outline gap-1.5" onclick="copyToClipboard()">복사</button>
      <button class="btn btn-sm btn-primary gap-1.5" onclick="exportToPptx()">PPT 저장</button>
      <button class="btn btn-sm btn-secondary gap-1.5" onclick="exportToTxt()">TXT 저장</button>
      <button class="btn btn-sm btn-accent gap-1.5" onclick="exportToSrt()">SRT 저장</button>
     </div>
    </div>
   </div>
  </div>
 </div>

 <dialog id="slideModal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box bg-black text-white flex items-center justify-center relative p-0 rounded-2xl overflow-hidden">
   <div id="modalSlideNum" class="absolute top-4 left-5 text-white/30 text-xs font-bold uppercase tracking-widest"></div>
   <div id="modalContent" class="text-center font-bold px-12 py-8 w-full" style="font-size: clamp(1.5rem, 4vw, 3rem);"></div>
   <button id="modalPrev" class="absolute left-3 top-1/2 -translate-y-1/2 btn btn-circle btn-ghost text-white/50" onclick="modalNav(-1)">&#8249;</button>
   <button id="modalNext" class="absolute right-3 top-1/2 -translate-y-1/2 btn btn-circle btn-ghost text-white/50" onclick="modalNav(1)">&#8250;</button>
   <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute top-3 right-3 text-white/40">✕</button></form>
  </div>
 </dialog>
 <div id="toastContainer" class="toast toast-bottom toast-end z-50 pointer-events-none"></div>

 <script>
  let currentSplit = 2; let saveTimer = null; let currentModalIdx = 0; let cachedSlides = [];
  const lyricInput = document.getElementById('lyricInput');
  const previewContainer = document.getElementById('previewContainer');
  const STORAGE_KEY = 'prolyrist_v1';
  const isMac = /Mac|iPhone|iPod|iPad/.test(navigator.platform);

  const EMPTY_STATE_HTML = `<div class="flex flex-col items-center justify-center h-full text-base-content/30 py-16 gap-4"><div>🎵</div><div class="text-base font-bold">가사를 입력해 주세요</div></div>`;

  function escapeHtml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function buildSlides(allLines) {
   const slides = []; let group = [];
   for (const line of allLines) {
    const trimmed = line.trim();
    if (trimmed === '---') { if (group.length > 0) slides.push([...group]); group = []; slides.push([]); }
    else if (trimmed !== '') { group.push(trimmed); if (group.length === currentSplit) { slides.push([...group]); group = []; } }
   }
   if (group.length > 0) slides.push([...group]);
   return slides;
  }

  function renderSlide(slideLines, idx) {
   const isEmpty = slideLines.length === 0;
   const content = isEmpty ? `<div class="opacity-25 italic text-sm">(빈 슬라이드)</div>` : slideLines.map(l => `<div>${escapeHtml(l)}</div>`).join('');
   return `<div class="slide-card mb-3 px-4 py-3 bg-base-100 border border-base-300 rounded-xl shadow-sm cursor-pointer hover:border-primary/50" onclick="openSlideModal(${idx})"><div class="text-[0.68rem] font-extrabold text-primary/80 mb-1">Slide ${idx + 1}</div><div class="text-base font-bold">${content}</div></div>`;
  }

  function updateView() {
   const rawLines = lyricInput.value.split('\n');
   const nonEmpty = rawLines.filter(l => l.trim() !== '' && l.trim() !== '---');
   document.getElementById('charInfo').textContent = `${nonEmpty.length}줄`;
   if (nonEmpty.length === 0 && !rawLines.some(l => l.trim() === '---')) { previewContainer.innerHTML = EMPTY_STATE_HTML; updateStats(0,0); autoResize(); return; }
   const slides = buildSlides(rawLines); cachedSlides = slides;
   previewContainer.innerHTML = slides.map((s, i) => renderSlide(s, i)).join('');
   updateStats(slides.length, nonEmpty.length); autoResize();
  }

  // ── 입력창 유동적 높이 조절 로직 (세로모드용) ──
  function autoResize() {
    const isPortrait = window.innerHeight > window.innerWidth;
    const isMobile = window.innerWidth < 1024;
    
    if (isMobile && isPortrait) {
      lyricInput.style.height = 'auto'; // 초기화
      lyricInput.style.height = lyricInput.scrollHeight + 'px'; // 스크롤 높이만큼 설정
    }
  }

  function updateStats(s, l) { document.getElementById('statSlides').textContent = `${s} 슬라이드`; document.getElementById('statLines').textContent = `${l} 줄`; }
  function setSplit(v) { currentSplit = v; document.querySelectorAll('.split-btn').forEach(b => { b.classList.toggle('btn-primary', parseInt(b.dataset.val)===v); b.classList.toggle('btn-outline', parseInt(b.dataset.val)!==v); }); saveToStorage(); updateView(); }
  function handleInput() { updateView(); clearTimeout(saveTimer); saveTimer = setTimeout(saveToStorage, 800); }
  function getSlideData() { return buildSlides(lyricInput.value.split('\n')); }
  function getSmartFileName(ext) { return `상록교회_자막_${new Date().toISOString().slice(2,10).replace(/-/g,'')}.${ext}`; }

  function showToast(m, t='info') {
   const toast = document.createElement('div'); toast.className = `alert alert-${t} shadow-lg py-2 px-4 text-sm mb-2`; toast.textContent = m;
   document.getElementById('toastContainer').appendChild(toast); setTimeout(() => toast.remove(), 3000);
  }

  function exportToPptx() {
   const data = getSlideData(); if (!data.length) return;
   const pptx = new PptxGenJS(); pptx.defineLayout({ name:'HD', width:13.33, height:7.5 }); pptx.layout='HD';
   data.forEach(lines => { const s = pptx.addSlide(); s.background={color:'000000'}; s.addText(lines.join('\n'), { x:0,y:0,w:'100%',h:'100%',align:'center',valign:'middle',color:'FFFFFF',fontSize:44,bold:true,fontFace:'Malgun Gothic'}); });
   pptx.writeFile({ fileName: getSmartFileName('pptx') });
  }

  function copyToClipboard() {
   const text = getSlideData().map(s => s.join('\n')).join('\n\n');
   navigator.clipboard.writeText(text).then(() => showToast('복사되었습니다!', 'success'));
  }

  function exportToTxt() {
   const blob = new Blob([getSlideData().map(s=>s.join('\n')).join('\n\n')], {type:'text/plain'});
   const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=getSmartFileName('txt'); a.click();
  }

  function exportToSrt() {
   const srt = getSlideData().map((l,i) => `${i+1}\n00:00:${String(i*3).padStart(2,'0')},000 --> 00:00:${String((i+1)*3).padStart(2,'0')},000\n${l.join('\n')}\n`).join('\n');
   const blob = new Blob([srt], {type:'text/plain'});
   const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=getSmartFileName('srt'); a.click();
  }

  function openSlideModal(idx) { currentModalIdx = idx; renderModal(); document.getElementById('slideModal').showModal(); }
  function renderModal() {
   const slides = cachedSlides; const idx = currentModalIdx;
   document.getElementById('modalContent').innerHTML = slides[idx]?.length ? slides[idx].map(l => `<div>${escapeHtml(l)}</div>`).join('') : '...';
   document.getElementById('modalSlideNum').textContent = `Slide ${idx+1} / ${slides.length}`;
  }
  function modalNav(d) { const n = currentModalIdx + d; if (n>=0 && n<cachedSlides.length) { currentModalIdx=n; renderModal(); } }

  function applyDark(d) { document.documentElement.classList.toggle('dark', d); document.documentElement.setAttribute('data-theme', d?'dark':'light'); document.getElementById('darkToggle').checked = d; }
  function toggleDark(c) { applyDark(c.checked); saveToStorage(); }
  function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ text: lyricInput.value, split: currentSplit, dark: document.documentElement.classList.contains('dark') })); }
  function loadFromStorage() { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); if (d.text) lyricInput.value = d.text; if (d.split) setSplit(d.split); if (d.dark) applyDark(true); }

  document.addEventListener('keydown', e => {
   const isCmdOrCtrl = isMac ? e.metaKey : e.ctrlKey;
   if (isCmdOrCtrl && !e.shiftKey && e.key.toLowerCase() === 's') { e.preventDefault(); exportToPptx(); }
   if (isCmdOrCtrl && !e.shiftKey && e.key.toLowerCase() === 'c') {
    if (!window.getSelection().toString()) { e.preventDefault(); copyToClipboard(); }
   }
   const modal = document.getElementById('slideModal');
   if (modal.open) { if (e.key === 'ArrowRight') modalNav(1); if (e.key === 'ArrowLeft') modalNav(-1); }
  });

  window.addEventListener('load', () => { loadFromStorage(); updateView(); });
  window.addEventListener('resize', () => { updateView(); });
 </script>
</body>
</html>

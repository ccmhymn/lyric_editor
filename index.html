<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>프로자막생성기 — 상록교회 방송실</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      important: '#sangrok-app-root',
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Pretendard Variable', 'sans-serif'] } } }
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <style>
    /* 전체 레이아웃 안정화 */
    #sangrok-app-root {
        all: initial;
        display: block;
        font-family: 'Pretendard Variable', sans-serif !important;
        background-color: transparent;
        width: 100%;
        margin: 0 auto;
    }
    #sangrok-app-root * { box-sizing: border-box; font-family: inherit !important; }

    /* [아이폰 세로] 입력창 & 미리보기 유동적 높이 */
    #lyricInput { 
        min-height: 140px; 
        max-height: 50vh; 
        overflow-y: hidden; 
        transition: height 0.1s ease;
    }
    #previewContainer {
        min-height: 120px;
        max-height: 60vh;
    }

    /* [아이폰 가로] PC처럼 2열 배치 강제 및 중앙 정렬 */
    @media (orientation: landscape) and (max-width: 1024px) {
        .main-grid {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            gap: 1.25rem !important;
        }
        #app { max-width: 100% !important; padding: 1rem 2rem !important; }
    }

    /* 스크롤바 커스텀 */
    #previewContainer::-webkit-scrollbar { width: 4px; }
    #previewContainer::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-base-100 text-base-content min-h-screen">

  <div id="sangrok-app-root">
    <div id="app" class="max-w-[1400px] mx-auto px-4 sm:px-6 py-4 sm:py-8">

      <header class="flex items-center justify-between mb-5 gap-2">
        <div class="flex items-center gap-2 sm:gap-4 overflow-hidden">
          <img src="https://cdn.imweb.me/upload/S20221222d3f155c224be8/4a8a3db1aa446.png"
               alt="로고" class="h-7 sm:h-10 w-auto shrink-0">
          <div class="flex flex-col sm:flex-row sm:items-baseline sm:gap-2">
            <h1 class="text-lg sm:text-2xl font-black tracking-tighter truncate">프로자막생성기</h1>
            <span class="text-[10px] sm:text-sm text-base-content/40 font-medium">by 방송실</span>
          </div>
        </div>
        
        <div class="flex items-center gap-1 sm:gap-2 shrink-0">
          <div class="hidden md:flex items-center gap-1 text-[10px] text-base-content/30 mr-2">
            <kbd class="kbd kbd-xs" id="modKey">Ctrl</kbd>+<kbd class="kbd kbd-xs">S</kbd><span>PPT</span>
            <span class="mx-1 opacity-40">|</span>
            <kbd class="kbd kbd-xs" id="modKey2">Ctrl</kbd>+<kbd class="kbd kbd-xs">Shift</kbd>+<kbd class="kbd kbd-xs">C</kbd><span>복사</span>
          </div>
          <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm">
            <input type="checkbox" id="darkToggle" onchange="toggleDark(this)">
            <svg class="swap-off w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7,5,6.34A1,1,0,0,0,3.54,7.76L4.24,8.46A1,1,0,0,0,5.64,7ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Zm6.36-9,.71-.71A1,1,0,0,0,17.66,4.34l-.71.71A1,1,0,0,0,18.36,6.5Z"/></svg>
            <svg class="swap-on w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
          </label>
        </div>
      </header>

      <div class="alert mb-5 py-2.5 flex-row items-center justify-between rounded-xl border border-info/20 bg-info/5 gap-3">
        <div class="flex items-center gap-2 overflow-hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-info shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
          <div class="flex flex-col truncate">
            <span class="text-[11px] sm:text-sm font-bold text-info leading-tight">가사 입력 전 맞춤법 검사를 권장합니다.</span>
            <span class="text-[10px] sm:text-xs text-base-content/40 leading-tight">네이버 검사기로 이동합니다.</span>
          </div>
        </div>
        <a href="https://search.naver.com/search.naver?where=nexearch&query=맞춤법+검사기" target="_blank" class="btn btn-xs sm:btn-sm btn-success shrink-0">검사기 ↗</a>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3">
        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar shrink-0">
          <span class="text-xs font-bold text-base-content/60 shrink-0">분할</span>
          <div class="join">
            <button class="btn btn-xs sm:btn-sm join-item split-btn btn-outline" data-val="1" onclick="setSplit(1)">1줄</button>
            <button class="btn btn-xs sm:btn-sm join-item split-btn btn-primary" data-val="2" onclick="setSplit(2)">2줄</button>
            <button class="btn btn-xs sm:btn-sm join-item split-btn btn-outline" data-val="3" onclick="setSplit(3)">3줄</button>
            <button class="btn btn-xs sm:btn-sm join-item split-btn btn-outline" data-val="4" onclick="setSplit(4)">4줄</button>
          </div>
        </div>
        <div class="flex items-center justify-end gap-1.5 shrink-0">
          <span id="statSlides" class="badge badge-xs sm:badge-sm badge-primary badge-outline font-bold">0 슬라이드</span>
          <span id="statLines" class="badge badge-xs sm:badge-sm badge-ghost">0 줄</span>
          <span class="badge badge-xs sm:badge-sm badge-success badge-outline gap-1">
            <span class="w-1 h-1 rounded-full bg-success animate-pulse"></span>Live
          </span>
        </div>
      </div>

      <div class="main-grid grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div class="flex flex-col">
          <div class="flex items-center justify-between mb-1.5 px-1">
            <label class="text-sm font-bold opacity-70">가사 원본 입력</label>
            <span id="charInfo" class="text-xs opacity-40">0줄</span>
          </div>
          <textarea id="lyricInput" class="textarea textarea-bordered w-full text-base leading-relaxed font-medium resize-none focus:outline-primary" placeholder="이곳에 가사를 붙여넣으세요..." oninput="handleInput()" spellcheck="false"></textarea>
        </div>

        <div class="flex flex-col">
          <div class="flex items-center justify-between mb-1.5 px-1">
            <label class="text-sm font-bold opacity-70">슬라이드 미리보기</label>
            <span class="text-xs opacity-40">클릭 시 전체화면</span>
          </div>
          <div id="previewContainer" class="flex-1 overflow-y-auto rounded-t-2xl border border-base-300 bg-base-200/50 p-4"></div>
          <div class="border border-t-0 border-base-300 rounded-b-2xl bg-base-100 p-2">
            <div class="grid grid-cols-4 gap-1.5">
              <button class="btn btn-xs sm:btn-sm btn-outline" onclick="copyToClipboard()">복사</button>
              <button class="btn btn-xs sm:btn-sm btn-primary" onclick="exportToPptx()">PPT</button>
              <button class="btn btn-xs sm:btn-sm btn-secondary" onclick="exportToTxt()">TXT</button>
              <button class="btn btn-xs sm:btn-sm btn-accent" onclick="exportToSrt()">SRT</button>
            </div>
          </div>
        </div>
      </div>

    </div><dialog id="slideModal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box bg-black text-white flex items-center justify-center relative p-0 rounded-2xl overflow-hidden aspect-video">
        <div id="modalSlideNum" class="absolute top-4 left-5 text-white/30 text-[10px] font-bold uppercase tracking-widest"></div>
        <div id="modalContent" class="text-center font-bold leading-tight px-10 py-6 select-none w-full" style="font-size: clamp(1rem, 5vw, 2.5rem);"></div>
        <button id="modalPrev" class="absolute left-2 top-1/2 -translate-y-1/2 btn btn-circle btn-ghost text-white/40" onclick="modalNav(-1)">❮</button>
        <button id="modalNext" class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-circle btn-ghost text-white/40" onclick="modalNav(1)">❯</button>
        <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute top-2 right-2 text-white/30">✕</button></form>
      </div>
      <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>
    <div id="toastContainer" class="toast toast-bottom toast-end z-50"></div>
  </div>

  <script>
    /** ── [UI] 동적 높이 및 OS 대응 ── **/
    const isMac = /Mac|iPhone|iPod|iPad/.test(navigator.platform);
    if (isMac) {
      document.getElementById('modKey').textContent = '⌘';
      document.getElementById('modKey2').textContent = '⌘';
    }

    function autoResizeUI() {
      const input = document.getElementById('lyricInput');
      input.style.height = 'auto';
      // 내용에 따라 늘어나되, 화면의 절반(50vh)은 넘지 않도록 설정
      input.style.height = Math.min(input.scrollHeight, window.innerHeight * 0.5) + 'px';
    }

    /** ── [Logic] 데이터 처리 (기존 기능 100% 유지) ── **/
    let currentSplit = 2;
    let saveTimer = null;
    let currentModalIdx = 0;
    let cachedSlides = [];
    const lyricInput = document.getElementById('lyricInput');
    const previewContainer = document.getElementById('previewContainer');
    const STORAGE_KEY = 'prolyrist_sangrok_v2';
    const EMPTY_STATE = `<div class="flex flex-col items-center justify-center h-full text-base-content/20 py-10 gap-2"><div class="text-4xl">🎶</div><div class="text-xs font-bold">가사를 입력해 주세요</div></div>`;

    function escapeHtml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function buildSlides(allLines) {
      const slides = []; let group = [];
      for (const line of allLines) {
        const trimmed = line.trim();
        if (trimmed === '---') {
          if (group.length > 0) { slides.push([...group]); group = []; }
          slides.push([]);
        } else if (trimmed === '') { continue; } 
        else {
          group.push(trimmed);
          if (group.length === currentSplit) { slides.push([...group]); group = []; }
        }
      }
      if (group.length > 0) slides.push([...group]);
      return slides;
    }

    function renderSlide(slideLines, idx) {
      const isEmpty = slideLines.length === 0;
      const content = isEmpty ? `<div class="opacity-20 italic text-xs">(빈 슬라이드)</div>` : slideLines.map(l => `<div>${escapeHtml(l)}</div>`).join('');
      return `<div class="mb-3 p-4 bg-base-100 border border-base-300 rounded-xl shadow-sm cursor-pointer hover:border-primary/50 transition-colors" onclick="openSlideModal(${idx})">
                <div class="text-[10px] font-bold text-primary/50 mb-1 uppercase tracking-tighter">Slide ${idx + 1}</div>
                <div class="text-sm sm:text-base font-bold leading-tight">${content}</div>
              </div>`;
    }

    function updateView() {
      const rawLines = lyricInput.value.split('\n');
      const nonEmpty = rawLines.filter(l => l.trim() !== '' && l.trim() !== '---');
      document.getElementById('charInfo').textContent = `${nonEmpty.length}줄`;
      
      if (nonEmpty.length === 0 && !rawLines.some(l => l.trim() === '---')) {
        previewContainer.innerHTML = EMPTY_STATE;
        updateStats(0, 0); cachedSlides = []; return;
      }
      
      const slides = buildSlides(rawLines);
      cachedSlides = slides;
      previewContainer.innerHTML = slides.map((s, i) => renderSlide(s, i)).join('');
      updateStats(slides.length, nonEmpty.length);
      autoResizeUI();
    }

    function updateStats(slideCount, lineCount) {
      document.getElementById('statSlides').textContent = `${slideCount} 슬라이드`;
      document.getElementById('statLines').textContent = `${lineCount} 줄`;
    }

    function handleInput() {
      updateView();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveToStorage, 800);
    }

    function setSplit(val) {
      currentSplit = val;
      document.querySelectorAll('.split-btn').forEach(btn => {
        const active = parseInt(btn.dataset.val) === val;
        btn.classList.toggle('btn-primary', active); btn.classList.toggle('btn-outline', !active);
      });
      saveToStorage(); updateView();
    }

    /** ── [Export] 기존 로직 유지 ── **/
    function getSlideData() { return cachedSlides; }
    function getFileName(ext) {
        const text = lyricInput.value.trim();
        let name = '상록교회_자막';
        if (text) name = text.split('\n')[0].substring(0,10).replace(/[^\w\s가-힣]/g, '').trim() || name;
        return `${name}_${new Date().toISOString().slice(2,10).replace(/-/g,'')}.${ext}`;
    }

    function exportToPptx() {
      const data = getSlideData(); if (!data.length) return showToast('내용이 없습니다.', 'warning');
      const pptx = new PptxGenJS();
      pptx.defineLayout({ name: 'HD', width: 13.33, height: 7.5 });
      pptx.layout = 'HD';
      data.forEach(lines => {
        const slide = pptx.addSlide(); slide.background = { color: '000000' };
        slide.addText(lines.join('\n'), { x:0, y:0, w:'100%', h:'100%', align:'center', valign:'middle', color:'FFFFFF', fontSize:44, bold:true, fontFace:'Malgun Gothic' });
      });
      pptx.writeFile({ fileName: getFileName('pptx') });
    }

    function copyToClipboard() {
      const text = getSlideData().map(s => s.join('\n')).join('\n\n');
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => showToast('복사되었습니다!', 'success'));
    }

    function exportToTxt() {
      const text = getSlideData().map(s => s.join('\n')).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = getFileName('txt'); a.click();
    }

    function exportToSrt() {
        const srt = getSlideData().map((l, i) => `${i+1}\n00:00:${String(i*3).padStart(2,'0')},000 --> 00:00:${String((i+1)*3).padStart(2,'0')},000\n${l.join('\n')}\n`).join('\n');
        const blob = new Blob([srt], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = getFileName('srt'); a.click();
    }

    /** ── [Modal/Utility] ── **/
    function openSlideModal(idx) { currentModalIdx = idx; renderModal(); document.getElementById('slideModal').showModal(); }
    function renderModal() {
      const slides = cachedSlides; const idx = currentModalIdx;
      document.getElementById('modalContent').innerHTML = (slides[idx] && slides[idx].length) ? slides[idx].map(l => `<div>${escapeHtml(l)}</div>`).join('') : '<span class="opacity-20">(Empty)</span>';
      document.getElementById('modalSlideNum').textContent = `Slide ${idx + 1} / ${slides.length}`;
      document.getElementById('modalPrev').style.visibility = idx > 0 ? 'visible' : 'hidden';
      document.getElementById('modalNext').style.visibility = idx < slides.length - 1 ? 'visible' : 'hidden';
    }
    function modalNav(dir) { 
        const next = currentModalIdx + dir; 
        if (next >= 0 && next < cachedSlides.length) { currentModalIdx = next; renderModal(); } 
    }

    function showToast(msg, type='info') {
      const t = document.createElement('div');
      t.className = `alert alert-${type} shadow-lg py-2 px-4 text-xs mb-2`;
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function applyDark(isDark) {
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('darkToggle').checked = isDark;
    }
    function toggleDark(cb) { applyDark(cb.checked); saveToStorage(); }
    function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ text: lyricInput.value, split: currentSplit, dark: document.documentElement.classList.contains('dark') })); }
    function loadFromStorage() {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (data.text) lyricInput.value = data.text;
      if (data.split) setSplit(data.split);
      if (data.dark) applyDark(true);
    }

    // [Shortcut] 윈도우 Ctrl / 맥 Cmd 공통 대응
    document.addEventListener('keydown', e => {
      const isCmdOrCtrl = e.ctrlKey || e.metaKey;
      if (isCmdOrCtrl && e.key.toLowerCase() === 's') { e.preventDefault(); exportToPptx(); }
      const modal = document.getElementById('slideModal');
      if (modal.open) {
        if (e.key === 'ArrowRight') modalNav(1);
        if (e.key === 'ArrowLeft') modalNav(-1);
      }
    });

    window.addEventListener('load', () => { loadFromStorage(); updateView(); });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>프로자막생성기 — 상록교회 방송실</title>

 <!-- Pretendard -->
 <link rel="preconnect" href="https://cdn.jsdelivr.net">

 <!-- Tailwind CSS Play CDN -->
 <script src="https://cdn.tailwindcss.com"></script>
 <script>
  tailwind.config = {
   darkMode: 'class',
   theme: {
    extend: {
     fontFamily: { sans: ['Pretendard Variable', 'Pretendard', 'sans-serif'] }
    }
   }
  }
 </script>

 <!-- DaisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">

 <!-- PptxGenJS -->

 <style>
  body { font-family: 'Pretendard Variable', Pretendard, sans-serif; }
  #lyricInput { ime-mode: active; }
  #previewContainer::-webkit-scrollbar { width: 5px; }
  #previewContainer::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 9999px; }
  #slideModal .modal-box { aspect-ratio: 16/9; max-width: min(92vw, 960px); width: 100%; height: auto; }
  .slide-card { transition: box-shadow 0.15s, border-color 0.15s; will-change: box-shadow; }
 </style>
</head>

<body class="bg-base-100 text-base-content min-h-screen font-sans">

 <div id="app" class="max-w-[1400px] mx-auto px-4 sm:px-6 py-6 sm:py-10">

  <!-- ── HEADER ── -->
  <header class="flex items-center justify-between mb-5 flex-wrap gap-4">
   <div class="flex items-center gap-4">
    <img src="https://cdn.imweb.me/upload/S20221222d3f155c224be8/4a8a3db1aa446.png"
      alt="상록교회 로고" class="h-11 w-auto object-contain">
    <div class="flex items-baseline gap-2">
     <h1 class="text-2xl sm:text-3xl font-black tracking-tight leading-none">프로자막생성기</h1>
     <span class="text-sm text-base-content/40 font-normal">by 방송실</span>
    </div>
   </div>
   <div class="flex items-center gap-2">
    <!-- Keyboard shortcut hints (desktop only) -->
    <div class="hidden md:flex items-center gap-1.5 text-xs text-base-content/40 mr-1">
     <kbd class="kbd kbd-xs">Ctrl+S</kbd><span>PPT</span>
     <span class="mx-1 opacity-40">|</span>
     <kbd class="kbd kbd-xs">Ctrl+Shift+C</kbd><span>복사</span>
    </div>
    <!-- Dark mode toggle -->
    <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm" title="다크모드 전환">
     <input type="checkbox" id="darkToggle" onchange="toggleDark(this)">
     <!-- sun (light mode) -->
     <svg class="swap-off w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7,5,6.34A1,1,0,0,0,3.54,7.76L4.24,8.46A1,1,0,0,0,5.64,7ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Zm6.36-9,.71-.71A1,1,0,0,0,17.66,4.34l-.71.71A1,1,0,0,0,18.36,6.5Z"/>
     </svg>
     <!-- moon (dark mode) -->
     <svg class="swap-on w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/>
     </svg>
    </label>
   </div>
  </header>

  <!-- ── SPELL CHECK BAR ── -->
  <div class="alert mb-5 py-3 flex-col sm:flex-row gap-3 sm:gap-0 rounded-xl border border-info/20 bg-info/5">
   <div class="flex items-center gap-3">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-info shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
     <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
    </svg>
    <div class="text-sm">
     <span class="font-bold text-info">가사 입력 전 맞춤법 검사를 권장합니다.</span>
     <span class="text-base-content/50 ml-1">오타 확인 후 아래에 붙여넣으세요.</span>
    </div>
   </div>
   <a href="https://search.naver.com/search.naver?where=nexearch&query=맞춤법+검사기"
    target="_blank" rel="noopener"
    class="btn btn-sm btn-success shrink-0 ml-auto">네이버 검사기 이동 ↗</a>
  </div>

  <!-- ── TOOLBAR: SPLIT + STATS ── -->
  <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
   <div class="flex items-center gap-3 flex-wrap">
    <span class="text-sm font-bold text-base-content/70">분할 단위</span>
    <div class="join">
     <button class="btn btn-sm join-item split-btn btn-outline" data-val="1" onclick="setSplit(1)">1줄</button>
     <button class="btn btn-sm join-item split-btn btn-primary" data-val="2" onclick="setSplit(2)">2줄</button>
     <button class="btn btn-sm join-item split-btn btn-outline" data-val="3" onclick="setSplit(3)">3줄</button>
     <button class="btn btn-sm join-item split-btn btn-outline" data-val="4" onclick="setSplit(4)">4줄</button>
    </div>
   </div>
   <div class="flex items-center gap-2 text-sm">
    <span id="statSlides" class="badge badge-primary badge-outline font-bold">0 슬라이드</span>
    <span id="statLines" class="badge badge-ghost">0 줄</span>
    <span class="badge badge-success badge-outline gap-1.5">
     <span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse inline-block"></span>Live
    </span>
   </div>
  </div>

  <!-- ── MAIN GRID ── -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

   <!-- LEFT: INPUT -->
   <div class="flex flex-col">
    <div class="flex items-center justify-between mb-1.5">
     <label class="text-sm font-bold flex items-center gap-1.5" for="lyricInput">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
       <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
      가사 원본 입력
     </label>
     <span id="charInfo" class="text-xs text-base-content/40">0줄</span>
    </div>
    <textarea
     id="lyricInput"
     class="textarea textarea-bordered w-full text-base leading-relaxed font-medium resize-none flex-1 focus:outline-primary focus:border-primary"
     style="min-height: 520px;"
     placeholder="가사를 입력하세요...&#10;&#10;— 절을 구분하려면 빈 줄을 두거나,&#10;— 빈 슬라이드를 삽입하려면 줄에 '---' 만 입력하세요."
     oninput="handleInput()"
     spellcheck="false"
    ></textarea>
   </div>

   <!-- RIGHT: PREVIEW -->
   <div class="flex flex-col">
    <div class="flex items-center justify-between mb-1.5">
     <label class="text-sm font-bold flex items-center gap-1.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
       <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      슬라이드 미리보기
     </label>
     <span class="text-xs text-base-content/40">클릭하면 전체화면</span>
    </div>

    <!-- Slide cards -->
    <div
     id="previewContainer"
     class="flex-1 overflow-y-auto rounded-t-2xl border border-base-300 bg-base-200/50 p-4"
     style="min-height: 520px; max-height: 560px;"
    ></div>

    <!-- Action footer -->
    <div class="border border-t-0 border-base-300 rounded-b-2xl bg-base-100 p-3">
     <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      <button class="btn btn-sm btn-outline gap-1.5" onclick="copyToClipboard()" title="Ctrl+Shift+C">
       <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
       </svg>
       복사
      </button>
      <button class="btn btn-sm btn-primary gap-1.5" onclick="exportToPptx()" title="Ctrl+S">
       <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
       </svg>
       PPT 저장
      </button>
      <button class="btn btn-sm btn-secondary gap-1.5" onclick="exportToTxt()">
       <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
       </svg>
       TXT 저장
      </button>
      <button class="btn btn-sm btn-accent gap-1.5" onclick="exportToSrt()">
       <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
       </svg>
       SRT 저장
      </button>
     </div>
    </div>
   </div>

  </div><!-- /grid -->
 </div><!-- /app -->

 <!-- ── FULLSCREEN SLIDE MODAL ── -->
 <dialog id="slideModal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box bg-black text-white flex items-center justify-center relative p-0 rounded-2xl overflow-hidden" style="max-width: min(92vw, 960px); width: 100%; aspect-ratio: 16/9; max-height: none;">
   <div id="modalSlideNum" class="absolute top-4 left-5 text-white/30 text-xs font-bold uppercase tracking-widest select-none"></div>
   <div id="modalContent" class="text-center font-bold leading-relaxed px-12 py-8 select-none w-full" style="font-size: clamp(1.5rem, 4vw, 3rem);"></div>
   <!-- prev/next -->
   <button id="modalPrev" class="absolute left-3 top-1/2 -translate-y-1/2 btn btn-circle btn-ghost text-white/50 hover:text-white hover:bg-white/10" onclick="modalNav(-1)">&#8249;</button>
   <button id="modalNext" class="absolute right-3 top-1/2 -translate-y-1/2 btn btn-circle btn-ghost text-white/50 hover:text-white hover:bg-white/10" onclick="modalNav(1)">&#8250;</button>
   <form method="dialog">
    <button class="btn btn-sm btn-circle btn-ghost absolute top-3 right-3 text-white/40 hover:text-white hover:bg-white/10">✕</button>
   </form>
  </div>
  <form method="dialog" class="modal-backdrop"><button>닫기</button></form>
 </dialog>

 <!-- ── TOAST CONTAINER ── -->
 <div id="toastContainer" class="toast toast-bottom toast-end z-50 pointer-events-none"></div>

 <!-- ────────────── SCRIPT ────────────── -->
 <script>
  // ── State ──
  let currentSplit = 2;
  let saveTimer = null;
  let currentModalIdx = 0;
  let cachedSlides = [];

  const lyricInput = document.getElementById('lyricInput');
  const previewContainer = document.getElementById('previewContainer');
  const STORAGE_KEY = 'prolyrist_v1';

  // ── Empty state HTML ──
  const EMPTY_STATE_HTML = `
   <div class="flex flex-col items-center justify-center h-full text-base-content/30 py-16 gap-4 select-none">
    <div class="text-5xl">🎵</div>
    <div class="text-base font-bold">가사를 입력하면 슬라이드가 자동 생성됩니다</div>
    <div class="text-sm space-y-1.5 text-center leading-relaxed">
     <div>줄바꿈으로 가사 줄을 구분하세요</div>
     <div><code class="bg-base-300 px-1.5 py-0.5 rounded text-xs font-mono">---</code> 를 입력하면 빈 슬라이드가 삽입됩니다</div>
     <div><kbd class="kbd kbd-sm">Ctrl+S</kbd> 로 PPT를 바로 저장하세요</div>
    </div>
   </div>`;

  // ── escapeHtml ──
  function escapeHtml(str) {
   return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  }

  // ── buildSlides: string[] → string[][] ──
  function buildSlides(allLines) {
   const slides = [];
   let group = [];
   for (const line of allLines) {
    const trimmed = line.trim();
    if (trimmed === '---') {
     if (group.length > 0) { slides.push([...group]); group = []; }
     slides.push([]);
    } else if (trimmed === '') {
     // skip blank lines
    } else {
     group.push(trimmed);
     if (group.length === currentSplit) {
      slides.push([...group]);
      group = [];
     }
    }
   }
   if (group.length > 0) slides.push([...group]);
   return slides;
  }

  // ── renderSlide: returns HTML string for one slide card ──
  function renderSlide(slideLines, idx) {
   const isEmpty = slideLines.length === 0;
   const fullText = slideLines.join('');
   const isLong = fullText.length > 50;

   const warningBadge = isLong
    ? `<span class="badge badge-warning badge-xs ml-1 align-middle" title="텍스트가 길어 PPT에서 잘릴 수 있습니다">⚠</span>`
    : '';

   const content = isEmpty
    ? `<div class="text-base-content/25 italic text-sm text-center py-2">(빈 슬라이드)</div>`
    : slideLines.map(l => `<div>${escapeHtml(l)}</div>`).join('');

   return `
    <div class="slide-card mb-3 px-4 pt-3 pb-3.5 bg-base-100 border border-base-300
          rounded-xl shadow-sm cursor-pointer hover:shadow-md hover:border-primary/50 group"
      onclick="openSlideModal(${idx})">
     <div class="flex items-center justify-between mb-1.5">
      <span class="text-[0.68rem] font-extrabold text-primary/80 uppercase tracking-widest">
       Slide ${idx + 1}${warningBadge}
      </span>
      <span class="text-[0.65rem] text-base-content/30 opacity-0 group-hover:opacity-100 transition-opacity">⛶ 전체화면</span>
     </div>
     <div class="text-base font-bold leading-snug text-base-content">${content}</div>
    </div>`;
  }

  // ── updateView ──
  function updateView() {
   const rawLines = lyricInput.value.split('\n');
   const nonEmpty = rawLines.filter(l => l.trim() !== '' && l.trim() !== '---');
   document.getElementById('charInfo').textContent = `${nonEmpty.length}줄`;

   if (nonEmpty.length === 0 && !rawLines.some(l => l.trim() === '---')) {
    previewContainer.innerHTML = EMPTY_STATE_HTML;
    updateStats(0, 0);
    cachedSlides = [];
    return;
   }

   const slides = buildSlides(rawLines);
   cachedSlides = slides;
   previewContainer.innerHTML = slides.map((s, i) => renderSlide(s, i)).join('');
   updateStats(slides.length, nonEmpty.length);
  }

  // ── updateStats ──
  function updateStats(slideCount, lineCount) {
   document.getElementById('statSlides').textContent = `${slideCount} 슬라이드`;
   document.getElementById('statLines').textContent = `${lineCount} 줄`;
  }

  // ── setSplit ──
  function setSplit(val) {
   currentSplit = val;
   document.querySelectorAll('.split-btn').forEach(btn => {
    const active = parseInt(btn.dataset.val) === val;
    btn.classList.toggle('btn-primary', active);
    btn.classList.toggle('btn-outline', !active);
   });
   saveToStorage();
   updateView();
  }

  // ── handleInput (debounced autosave) ──
  function handleInput() {
   updateView();
   clearTimeout(saveTimer);
   saveTimer = setTimeout(saveToStorage, 800);
  }

  // ── getSlideData → string[][] ──
  function getSlideData() {
   return buildSlides(lyricInput.value.split('\n'));
  }

  // ── getSmartFileName ──
  function getSmartFileName(extension) {
   const text = lyricInput.value.trim();
   const now = new Date();
   const year = now.getFullYear().toString().slice(-2);
   const month = (now.getMonth() + 1).toString().padStart(2, '0');
   const day = now.getDate().toString().padStart(2, '0');
   const dateStr = `${year}-${month}-${day}`;

   let baseName = '상록교회_자막';
   if (text) {
    const firstLine = text.split('\n')[0].replace(/[^\w\s가-힣]/g, '').trim();
    if (firstLine) baseName = firstLine.substring(0, 8).replace(/\s+/g, '_');
   }
   return `${baseName}_${dateStr}.${extension}`;
  }

  // ── showToast ──
  function showToast(message, type = 'info') {
   const classMap = {
    info: 'alert-info',
    success: 'alert-success',
    warning: 'alert-warning',
    error: 'alert-error'
   };
   const toast = document.createElement('div');
   toast.className = `alert ${classMap[type] || 'alert-info'} shadow-lg py-2.5 px-4 text-sm max-w-xs pointer-events-auto`;
   toast.textContent = message;
   document.getElementById('toastContainer').appendChild(toast);
   setTimeout(() => toast.remove(), 3000);
  }

  // ── exportToPptx ──
  function exportToPptx() {
   const slidesData = getSlideData();
   if (slidesData.length === 0) return showToast('내용을 입력해주세요.', 'warning');
   try {
    const pptx = new PptxGenJS();
    pptx.defineLayout({ name: 'SANGROK_HD', width: 13.33, height: 7.5 });
    pptx.layout = 'SANGROK_HD';
    slidesData.forEach(lines => {
     const slide = pptx.addSlide();
     slide.background = { color: '000000' };
     slide.addText(lines.join('\n'), {
      x: 0, y: 0, w: '100%', h: '100%',
      align: 'center', valign: 'middle',
      color: 'FFFFFF', fontSize: 44, bold: true,
      fontFace: 'Malgun Gothic'
     });
    });
    pptx.writeFile({ fileName: getSmartFileName('pptx') });
    showToast(`PPT 저장 완료 (${slidesData.length} 슬라이드)`, 'success');
   } catch (err) {
    console.error('PPT 생성 실패:', err);
    showToast('PPT 생성 중 오류가 발생했습니다.', 'error');
   }
  }

  // ── copyToClipboard ──
  function copyToClipboard() {
   const slides = getSlideData();
   if (slides.length === 0) return showToast('내용을 입력해주세요.', 'warning');
   const text = slides.map(s => s.join('\n')).join('\n\n');
   if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
     .then(() => showToast('클립보드에 복사되었습니다!', 'success'))
     .catch(() => fallbackCopy(text));
   } else {
    fallbackCopy(text);
   }
  }

  function fallbackCopy(text) {
   const el = document.createElement('textarea');
   el.value = text;
   el.style.position = 'fixed';
   el.style.opacity = '0';
   document.body.appendChild(el);
   el.select();
   try {
    document.execCommand('copy');
    showToast('클립보드에 복사되었습니다!', 'success');
   } catch {
    showToast('복사에 실패했습니다.', 'error');
   }
   document.body.removeChild(el);
  }

  // ── exportToTxt ──
  function exportToTxt() {
   const slides = getSlideData();
   if (slides.length === 0) return showToast('내용을 입력해주세요.', 'warning');
   const text = slides.map(s => s.join('\n')).join('\n\n');
   const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
   const a = document.createElement('a');
   a.href = URL.createObjectURL(blob);
   a.download = getSmartFileName('txt');
   a.click();
   showToast('TXT 파일이 저장되었습니다.', 'success');
  }

  // ── exportToSrt ──
  function exportToSrt() {
   const slides = getSlideData();
   if (slides.length === 0) return showToast('내용을 입력해주세요.', 'warning');
   const SEC = 3;
   function toTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')},000`;
   }
   const srt = slides.map((lines, i) => {
    const start = i * SEC;
    const end = start + SEC;
    return `${i + 1}\n${toTime(start)} --> ${toTime(end)}\n${lines.join('\n')}\n`;
   }).join('\n');
   const blob = new Blob([srt], { type: 'text/plain;charset=utf-8' });
   const a = document.createElement('a');
   a.href = URL.createObjectURL(blob);
   a.download = getSmartFileName('srt');
   a.click();
   showToast('SRT 파일이 저장되었습니다.', 'success');
  }

  // ── Slide modal ──
  function openSlideModal(idx) {
   currentModalIdx = idx;
   renderModal();
   document.getElementById('slideModal').showModal();
  }

  function renderModal() {
   const slides = cachedSlides.length ? cachedSlides : getSlideData();
   const idx = currentModalIdx;
   const slideLines = slides[idx];

   const content = (slideLines && slideLines.length > 0)
    ? slideLines.map(l => `<div>${escapeHtml(l)}</div>`).join('')
    : '<div class="opacity-30 italic">(빈 슬라이드)</div>';

   document.getElementById('modalContent').innerHTML = content;
   document.getElementById('modalSlideNum').textContent = `Slide ${idx + 1} / ${slides.length}`;

   document.getElementById('modalPrev').style.visibility = idx > 0 ? 'visible' : 'hidden';
   document.getElementById('modalNext').style.visibility = idx < slides.length - 1 ? 'visible' : 'hidden';
  }

  function modalNav(dir) {
   const slides = cachedSlides.length ? cachedSlides : getSlideData();
   const next = currentModalIdx + dir;
   if (next >= 0 && next < slides.length) {
    currentModalIdx = next;
    renderModal();
   }
  }

  // ── Dark mode ──
  function applyDark(isDark) {
   document.documentElement.classList.toggle('dark', isDark);
   document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
   document.getElementById('darkToggle').checked = isDark;
  }

  function toggleDark(checkbox) {
   applyDark(checkbox.checked);
   saveToStorage();
  }

  // ── LocalStorage ──
  function saveToStorage() {
   try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
     text: lyricInput.value,
     split: currentSplit,
     dark: document.documentElement.classList.contains('dark')
    }));
   } catch (e) { /* quota exceeded or private mode */ }
  }

  function loadFromStorage() {
   try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.text != null) lyricInput.value = data.text;
    if (data.split) setSplit(data.split);
    if (data.dark) applyDark(true);
   } catch (e) { /* corrupt */ }
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
   if (e.ctrlKey && !e.shiftKey && e.key === 's') {
    e.preventDefault();
    exportToPptx();
   }
   if (e.ctrlKey && e.shiftKey && e.key === 'C') {
    e.preventDefault();
    copyToClipboard();
   }
   // Arrow keys in modal
   const modal = document.getElementById('slideModal');
   if (modal.open) {
    if (e.key === 'ArrowRight') modalNav(1);
    if (e.key === 'ArrowLeft') modalNav(-1);
    if (e.key === 'Escape') modal.close();
   }
  });

  // ── Init ──
  loadFromStorage();
  updateView();
 </script>

</body>
